# =============================================================================
# CI — NetX
#
# Roda em PR e em push pra main. Bloqueia merge se algo quebrar.
# Cobre: install, build (Nx run-many), lint. Adicionar testes quando virem.
#
# Por que não usa Nx Cloud / cache distribuído ainda:
#   - Repositório privado, projeto cedo. Cache do Actions já dá ~3-5x speedup
#     vs cold install. Migrar pra Nx Cloud quando o monorepo dobrar de tamanho.
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela CIs antigos em commits superados — economiza minutos de runner em
# pushes rápidos (rebase, force-push de PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Necessário pro Prisma generate funcionar em ambiente sem rede de DB —
  # gera só os tipos, não conecta. URL fictícia.
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # @v5: roda em Node 24 (Node 20 será removido dos runners em set/2026).
        uses: actions/checkout@v5
        with:
          # Nx pode usar `git diff base..head` pra rodar só projetos afetados;
          # precisa de fetch-depth: 0 pra ter histórico completo.
          fetch-depth: 0

      - name: Setup Node
        # @v5: roda em Node 24. `node-version` continua sendo o Node usado pelo
        # workflow (não pela própria action). 24 = Active LTS atual (até out/2026).
        # Pra bumpar pra Node 26 quando virar LTS em out/2026: troque aqui, em
        # package.json (engines.node), em apps/*/package.json (@types/node) e em
        # infra/installer/lib/packages.sh (NETX_NODE_MAJOR). Lista em STACK-REFRESH.md.
        uses: actions/setup-node@v5
        with:
          node-version: 24
          # Cache do npm — exige package-lock.json no repo (committado pela VPS dev).
          cache: npm

      - name: Install dependencies
        # `npm ci` agora que o lockfile está no repo — install reprodutível.
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Prisma generate
        # O build do core-service depende dos types do @prisma/client.
        # `db push` não roda em CI (sem banco) — só generate.
        run: npx prisma generate --schema apps/core-service/prisma/schema.prisma

      - name: Cache Nx
        # @v4 ainda é o stable; v5 é beta. Bumpar quando sair stable.
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nx-${{ runner.os }}-

      - name: Build all
        run: npx nx run-many -t build

      - name: Lint
        # `continue-on-error` enquanto linting tá com legado pra resolver. Tira
        # quando estiver verde.
        continue-on-error: true
        run: npx nx run-many -t lint

  test:
    name: Testes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      # postgis/postgis em vez de postgres puro: o schema declara a extensão
      # postgis e as migrations falham sem ela. POSTGRES_USER vira superuser do
      # container, então CREATE EXTENSION funciona sem passo extra de permissão.
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: netx
          POSTGRES_PASSWORD: netx
          POSTGRES_DB: netx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      # Os scripts de teste carregam .env via dotenv-cli (padrão do repo). Criar
      # o arquivo aqui faz o comando ser LITERALMENTE o mesmo em CI e na máquina
      # do dev — sem caminho especial que só quebra em um dos dois.
      - name: Preparar .env
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://netx:netx@localhost:5432/netx_test
          DATABASE_URL_TEST=postgresql://netx:netx@localhost:5432/netx_test
          # Chave DESCARTÁVEL, só para o CryptoService inicializar nos testes.
          # Não protege nada: o banco do CI morre junto com o job.
          KMS_MASTER_KEY=00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
          EOF

      - name: Extensões do Postgres
        env:
          PGPASSWORD: netx
        run: |
          for ext in uuid-ossp pgcrypto citext pg_trgm postgis; do
            psql -h localhost -U netx -d netx_test -c "CREATE EXTENSION IF NOT EXISTS \"$ext\";"
          done

      - name: Prisma generate
        run: npx prisma generate --schema apps/core-service/prisma/schema.prisma

      - name: Testes unitários
        run: npx nx run-many -t test --exclude=nms

      # O globalSetup aplica as migrations no banco de teste antes de rodar.
      - name: Testes de integração
        run: npm run test:e2e
