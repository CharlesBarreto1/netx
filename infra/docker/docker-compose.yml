name: netx-dev

networks:
  netx:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  traccar_data:
  traccar_logs:

services:
  postgres:
    # PostGIS, não o postgres puro: a migration 20260705130000_fibermap_foundation
    # roda `CREATE EXTENSION postgis` e o schema declara extensions=[..., postgis].
    # Com postgres:16-alpine o extension control file nem existe, então o
    # `IF NOT EXISTS` não salva — a migration falha e o próximo deploy trava com
    # P3009. Drop-in: mesmas envs, mesmo entrypoint, mesma major (16).
    image: postgis/postgis:16-3.5-alpine
    container_name: netx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netx_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-netx}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-netx} -d ${POSTGRES_DB:-netx}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - netx

  redis:
    image: redis:7-alpine
    container_name: netx-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'allkeys-lru']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - netx

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: netx-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-netx}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-netx_dev_password}
    ports:
      - '5672:5672'    # AMQP
      - '15672:15672'  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - netx

  mailhog:
    # Catch-all SMTP server for dev — read emails at http://localhost:8025
    image: mailhog/mailhog:latest
    container_name: netx-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - netx

  adminer:
    image: adminer:latest
    container_name: netx-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netx

  # Traccar — plataforma de rastreamento GPS (fonte do "Ao vivo" da Frota).
  # Web/API em http://localhost:8082 (default admin/admin no primeiro acesso).
  # O core-service consome /api/devices + /api/positions (ver TRACCAR_* no .env).
  #
  # Para INJETAR posições de teste sem hardware, use o protocolo OsmAnd (5055):
  #   curl "http://localhost:5055/?id=<IMEI>&lat=-23.561&lon=-46.656&speed=0"
  # onde <IMEI> = trackerUniqueId do veículo cadastrado no NetX (e o device
  # precisa existir no Traccar com esse mesmo uniqueId).
  traccar:
    image: traccar/traccar:5.12
    container_name: netx-traccar
    restart: unless-stopped
    ports:
      - '8082:8082'        # Web UI + REST API
      - '5055:5055'        # OsmAnd (HTTP) — útil pra simular posições em dev
      - '5011:5011'        # Suntech
      - '5023:5023'        # GT06 / Concox
      - '5013:5013'        # Meiligao
    volumes:
      - traccar_data:/opt/traccar/data
      - traccar_logs:/opt/traccar/logs
    networks:
      - netx

  # ───────────────────────────────────────────────────────────────────────────
  # NMS — módulo do ecossistema (apps/nms). Sob o profile `ecosystem`, então a
  # stack de prod (4 units) NÃO o sobe por default. Suba com:
  #   docker compose --profile ecosystem -f infra/docker/docker-compose.yml up -d nms-api
  #
  # Conecta na MESMA infra (postgres/redis/rabbitmq) mas é DONO do schema `nms`
  # (invariante 3). SSO: CORE_JWT_SECRET = JWT_ACCESS_SECRET do Core (canal 1).
  # Eventos LIGADOS aqui (canal 3) pra fechar o round-trip em dev.
  #
  # Nota: features de equipamento (SSH/SNMP) exigem o device-gateway Python +
  # TimescaleDB — esses ficam no compose próprio do NMS (apps/nms/infra). Aqui
  # subimos só a API pra exercitar os 4 canais de integração.
  nms-api:
    profiles: ['ecosystem']
    build:
      context: ../../apps/nms
      dockerfile: apps/api/Dockerfile
    container_name: netx-nms-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-netx}:${POSTGRES_PASSWORD:-netx_dev_password}@postgres:5432/${POSTGRES_DB:-netx}?schema=nms
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-netx}:${RABBITMQ_PASSWORD:-netx_dev_password}@rabbitmq:5672
      # SSO (canal 1): aceitar o JWT de operador do Core.
      CORE_JWT_SECRET: ${JWT_ACCESS_SECRET:-changeme_dev_access_secret_min_32_chars}
      CORE_JWT_ISSUER: netx
      CORE_JWT_AUDIENCE: netx-api
      # Segredo nativo do NMS (login próprio) — dev.
      JWT_SECRET: ${NMS_JWT_SECRET:-changeme_dev_nms_secret_min_32_chars_xx}
      # Eventos (canal 3): LIGADO em dev pra fechar o round-trip.
      EVENTBUS_CONSUME: 'true'
      EVENTBUS_EXCHANGE: netx.events
      ADMIN_USERNAME: ${NMS_ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${NMS_ADMIN_PASSWORD:-}
    ports:
      - '3300:3000'   # host 3300 → NMS_SERVICE_PORT do gateway aponta pra cá
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - netx
