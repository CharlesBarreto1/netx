# NetX NMS — Telegraf (Fase 0: pipeline mínimo → TimescaleDB).
# Fase 2a adiciona inputs.snmp (IF-MIB + jnxBoxAnatomy/jnxOperating* + DOM óptico) e inputs.snmp_trap.

[agent]
  interval = "30s"
  flush_interval = "10s"
  hostname = "netx-nms"
  omit_hostname = false

# Métrica interna do próprio Telegraf — smoke test do caminho até o TSDB.
[[inputs.internal]]

# Receptor de traps SNMP (link up/down etc.) → measurement "snmptrap" no schema metrics.
# O equipamento precisa ser configurado para enviar traps a este coletor:162.
[[inputs.snmp_trap]]
  service_address = "udp://:162"
  # MIBs padrão (montadas no path default do gosmi) para resolver os OIDs dos traps.
  path = ["/usr/share/snmp/mibs"]

[[outputs.postgresql]]
  connection = "host=timescaledb user=netx password=netx dbname=netx_nms sslmode=disable"
  # As séries temporais ficam no schema `metrics`, fora do `public` gerenciado pelo Prisma
  # (senão o Prisma trata estas tabelas como drift e tenta dropá-las). As funções do
  # TimescaleDB seguem resolvendo via search_path padrão (public).
  schema = "metrics"
  # Cria hypertable automaticamente para cada measurement.
  create_templates = [
    '''CREATE TABLE {{ .table }} ({{ .columns }})''',
    '''SELECT create_hypertable({{ .table|quoteLiteral }}, by_range('time', INTERVAL '7 days'), if_not_exists => true)''',
  ]
  # Adiciona colunas novas a tabelas existentes (ex.: novos OIDs no template) sem dropar.
  add_column_templates = [
    '''ALTER TABLE {{ .table }} ADD COLUMN IF NOT EXISTS {{ .columns|join ", ADD COLUMN IF NOT EXISTS " }}''',
  ]
