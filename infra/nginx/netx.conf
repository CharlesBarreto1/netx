# =============================================================================
# NetX — Nginx site config (produção)
# Salvar em: /etc/nginx/sites-available/netx
# Linkar em: /etc/nginx/sites-enabled/netx
#
# Antes de usar: substitua TODOS os "SEU_DOMINIO" pelo seu domínio real
# Ex.: sed -i 's/SEU_DOMINIO/app.meuisp.com.br/g' /etc/nginx/sites-available/netx
#
# O Certbot reescreve este arquivo ao emitir o certificado, adicionando o
# bloco TLS e o redirect 80→443. Não edite manualmente depois disso —
# rode `sudo certbot --nginx -d SEU_DOMINIO` e ele faz o trabalho.
# =============================================================================

# ---------- limites globais (coloque em /etc/nginx/conf.d/ se preferir) ----
client_max_body_size 25m;

# Upstreams nomeados — facilita troca de portas no futuro
upstream netx_web {
    server 127.0.0.1:3200;
    keepalive 32;
}

upstream netx_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO;

    # Headers de segurança básicos (Certbot mantém ao migrar pra TLS)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logs separados por site
    access_log /var/log/nginx/netx.access.log;
    error_log  /var/log/nginx/netx.error.log warn;

    # ---- API Gateway (NestJS) em /api/* ----
    # O gateway escuta em :3000 e já tem global prefix `/v1`,
    # então `/api/v1/auth/login` no Nginx vira `/api/v1/auth/login` no Node.
    # Se quiser remover o prefixo /api antes de mandar pro Node, troque
    # `proxy_pass http://netx_api;` por `proxy_pass http://netx_api/;`
    # (com a barra final).
    location /api/ {
        proxy_pass http://netx_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Bloqueia o Swagger em produção
        location = /api/docs       { return 404; }
        location ~ ^/api/docs/.*$  { return 404; }
        location = /api/docs-json  { return 404; }
    }

    # ---- Web (Next.js) em / ----
    location / {
        proxy_pass http://netx_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Cache agressivo dos assets estáticos do Next
    location /_next/static/ {
        proxy_pass http://netx_web;
        proxy_cache_valid 200 30d;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Bloqueia arquivos sensíveis
    location ~ /\.(?!well-known) { deny all; }
}
