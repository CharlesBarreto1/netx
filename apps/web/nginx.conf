# nginx do front NetX NMS: serve o SPA e faz proxy para a API (serviço `api` na rede compose).
# Espelha o proxy do vite dev: /api/* é reescrito removendo o prefixo /api.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API REST — o trailing slash no proxy_pass remove o prefixo /api/ (vira / no upstream).
  location /api/ {
    proxy_pass http://api:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # WebSocket do terminal SSH (mantém o caminho; precisa de upgrade).
  location /ws/terminal {
    proxy_pass http://api:3000/ws/terminal;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # SPA fallback: qualquer rota desconhecida volta pro index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
