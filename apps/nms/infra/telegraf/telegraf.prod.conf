# NetX NMS — Telegraf (produção). Igual ao telegraf.conf de dev, mas a conexão ao Postgres
# usa interpolação de variáveis de ambiente (Telegraf resolve ${VAR}) para não fixar segredo.
# Os inputs SNMP por device são materializados pelo gateway em telegraf.d/ (ADR 0003).

[agent]
  interval = "30s"
  flush_interval = "10s"
  hostname = "netx-nms"
  omit_hostname = false

# Métrica interna do próprio Telegraf — smoke test do caminho até o TSDB.
[[inputs.internal]]

# Receptor de traps SNMP (link up/down etc.) → measurement "snmptrap" no schema metrics.
[[inputs.snmp_trap]]
  service_address = "udp://:162"
  path = ["/usr/share/snmp/mibs"]

[[outputs.postgresql]]
  connection = "host=timescaledb user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=disable"
  schema = "metrics"
  create_templates = [
    '''CREATE TABLE {{ .table }} ({{ .columns }})''',
    '''SELECT create_hypertable({{ .table|quoteLiteral }}, by_range('time', INTERVAL '7 days'), if_not_exists => true)''',
  ]
  add_column_templates = [
    '''ALTER TABLE {{ .table }} ADD COLUMN IF NOT EXISTS {{ .columns|join ", ADD COLUMN IF NOT EXISTS " }}''',
  ]
