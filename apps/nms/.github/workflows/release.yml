name: release

# Publica as 3 imagens no GHCR e anexa o bundle de deploy ao Release.
# Dispara ao empurrar uma tag vX.Y.Z, ou manualmente (workflow_dispatch).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/versão a publicar (ex.: v1.2.3)'
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
          - name: device-gateway
            dockerfile: apps/device-gateway/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Resolver versão
        id: ver
        run: echo "version=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/netx-nms-${{ matrix.name }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bundle:
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolver versão
        id: ver
        run: echo "version=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Bundle de deploy: tudo que o install.sh/update.sh precisam na máquina do cliente
      # (sem código-fonte nem segredo). As apps vêm como imagens do GHCR.
      - name: Montar bundle de deploy
        run: |
          set -e
          V="${{ steps.ver.outputs.version }}"
          mkdir -p stage/netx-nms
          cp infra/docker-compose.prod.yml stage/netx-nms/docker-compose.yml
          cp infra/.env.prod.example stage/netx-nms/.env.example
          cp -r infra/initdb stage/netx-nms/initdb
          mkdir -p stage/netx-nms/telegraf
          cp infra/telegraf/telegraf.prod.conf stage/netx-nms/telegraf/telegraf.prod.conf
          cp infra/telegraf/fetch-mibs.sh stage/netx-nms/telegraf/fetch-mibs.sh 2>/dev/null || true
          cp scripts/install.sh stage/netx-nms/install.sh
          cp scripts/update.sh stage/netx-nms/update.sh
          echo "$V" > stage/netx-nms/VERSION
          chmod +x stage/netx-nms/*.sh
          tar -C stage -czf netx-nms-stack.tar.gz netx-nms

      - name: Publicar no Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            netx-nms-stack.tar.gz
            scripts/install.sh
            scripts/update.sh
          generate_release_notes: true
